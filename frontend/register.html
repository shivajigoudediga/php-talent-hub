<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PHP Talent Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl shadow-gray-200">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PHP Talent Hub</a>
            <h2 class="text-2xl font-bold text-gray-900 mt-6">Create Account</h2>
            <p class="text-gray-500 mt-2">Join the world's best PHP developers.</p>
        </div>
        <form id="register-form" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                <input type="text" id="name" name="name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" placeholder="John Doe">
            </div>
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" placeholder="john@example.com">
            </div>
            <div>
                <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">Mobile Number</label>
                <input type="tel" id="phone" name="phone" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" placeholder="Enter your mobile number">
            </div>
            <div>
                <label for="role" class="block text-sm font-semibold text-gray-700 mb-2">I am a</label>
                <select id="role" name="role" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none bg-white">
                    <option value="developer">Developer</option>
                    <option value="recruiter">Recruiter</option>
                </select>
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" placeholder="••••••••">
            </div>
            <button type="submit" id="register-btn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-lg shadow-indigo-100 flex items-center justify-center">
                <span>Create Account</span>
                <i class="fas fa-arrow-right ml-2 text-sm"></i>
            </button>
        </form>
        <div class="mt-8 text-center">
            <p class="text-gray-600">Already have an account? <a href="login.html" class="text-indigo-600 font-bold hover:underline">Login here</a></p>
        </div>
    </div>
    
    <!-- OTP Verification Modal -->
    <div id="otp-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white max-w-sm w-full p-8 rounded-2xl shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 mx-auto mb-6">
                <i class="fas fa-envelope-open-text text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Verify your Email</h3>
            <p class="text-gray-600 mb-6">Enter the 6-digit OTP sent to your email.</p>
            <div class="flex justify-center space-x-2 mb-6">
                <input type="text" maxlength="6" id="otp-input" class="w-full px-4 py-3 text-center text-2xl font-bold tracking-widest rounded-lg border-2 border-indigo-600 focus:ring-0 outline-none">
            </div>
            <button id="verify-otp-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition mb-4">Verify & Continue</button>
            <button id="resend-otp-btn" class="text-sm font-bold text-indigo-600 hover:underline">Resend OTP</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
