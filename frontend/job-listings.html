<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Job Listings | PHP Talent Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <!-- Navbar (same as index.html) -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PHP Talent Hub</a>
            <div id="user-nav" class="flex items-center space-x-4">
                <a href="login.html" class="text-gray-600 font-medium hover:text-indigo-600">Login</a>
                <a href="register.html" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700">Register</a>
            </div>
        </div>
    </nav>

    <!-- Filter Bar -->
    <div class="bg-white border-b py-6 px-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-4">
            <div class="flex-1 w-full relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Search by job title or framework (Laravel, Symfony...)" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="w-full md:w-48 relative">
                <i class="fas fa-map-marker-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="location-input" placeholder="Location" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button id="filter-btn" class="w-full md:w-auto bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition flex items-center justify-center">
                <i class="fas fa-filter mr-2"></i> Filter
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-12 px-4 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Sidebar Filters -->
        <aside class="hidden lg:block space-y-8">
            <div>
                <h3 class="font-bold text-gray-900 mb-4">Job Type</h3>
                <div class="space-y-2">
                    <label class="flex items-center text-gray-600 cursor-pointer"><input type="checkbox" class="mr-2 accent-indigo-600"> Full-time</label>
                    <label class="flex items-center text-gray-600 cursor-pointer"><input type="checkbox" class="mr-2 accent-indigo-600"> Remote</label>
                    <label class="flex items-center text-gray-600 cursor-pointer"><input type="checkbox" class="mr-2 accent-indigo-600"> Contract</label>
                </div>
            </div>
            <div>
                <h3 class="font-bold text-gray-900 mb-4">Salary Range</h3>
                <div class="space-y-2">
                    <label class="flex items-center text-gray-600 cursor-pointer"><input type="radio" name="salary" class="mr-2 accent-indigo-600"> ₹0 - ₹5 LPA</label>
                    <label class="flex items-center text-gray-600 cursor-pointer"><input type="radio" name="salary" class="mr-2 accent-indigo-600"> ₹5 - ₹10 LPA</label>
                    <label class="flex items-center text-gray-600 cursor-pointer"><input type="radio" name="salary" class="mr-2 accent-indigo-600"> ₹10+ LPA</label>
                </div>
            </div>
        </aside>
        <div>
            <h3 class="skills">Skills set </h3>
            <data class="skills">PHP, Laravel, Symfony, CodeIgniter, Zend Framework, CakePHP, Yii, Phalcon, FuelPHP, Slim Framework</data>
        </div>
        <!-- Job Cards List -->
        <div class="lg:col-span-3 space-y-6" id="jobs-container">
            <!-- Loading State -->
            <div class="animate-pulse space-y-6">
                <div class="h-32 bg-gray-200 rounded-xl"></div>
                <div class="h-32 bg-gray-200 rounded-xl"></div>
                <div class="h-32 bg-gray-200 rounded-xl"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const name = localStorage.getItem('name');

        if (token && name) {
            const userNav = document.getElementById('user-nav');
            const dashboardUrl = role === 'developer' ? 'developer-dashboard.html' : 'recruiter-dashboard.html';
            userNav.innerHTML = `
                <a href="${dashboardUrl}" class="text-indigo-600 font-bold hover:underline">Hi, ${name}</a>
                <button onclick="logout()" class="text-gray-600 font-medium hover:text-red-600 transition">Logout</button>
            `;
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }
        
        async function fetchJobs() {
            const container = document.getElementById('jobs-container');
            const searchInput = document.getElementById('search-input').value;
            const locationInput = document.getElementById('location-input').value;
            
            let url = `${API_URL}/jobs/`;
            const params = new URLSearchParams();
            if (searchInput) params.append('framework', searchInput);
            if (locationInput) params.append('location', locationInput);
            if (params.toString()) url += `?${params.toString()}`;

            try {
                const response = await fetch(url);
                const jobs = await response.json();
                
                if (jobs.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-gray-500">No jobs found matching your criteria.</div>`;
                    return;
                }
                
                container.innerHTML = jobs.map(j => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-md transition duration-200 group">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900 group-hover:text-indigo-600 transition">${j.title}</h3>
                                <div class="flex flex-wrap gap-4 mt-2 text-sm text-gray-500 font-medium">
                                    <span><i class="fas fa-building mr-1"></i> ${j.company || 'Confidential'}</span>
                                    <span><i class="fas fa-map-marker-alt mr-1"></i> ${j.location}</span>
                                    <span><i class="fas fa-briefcase mr-1"></i> ${j.experience_required} yrs</span>
                                    <span><i class="fas fa-wallet mr-1"></i> ${j.salary_range}</span>
                                </div>
                                <div class="mt-4 flex flex-wrap gap-2">
                                    ${j.frameworks.split(',').map(f => `<span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-xs font-bold rounded-full uppercase">${f.trim()}</span>`).join('')}
                                </div>
                            </div>
                            <button onclick="applyToJob(${j.id})" class="w-full md:w-auto bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">Apply Now</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<div class="text-center py-20 text-red-500">Failed to load jobs.</div>`;
            }
        }

        async function applyToJob(jobId) {
            if (!token) {
                alert('Please login as a developer to apply.');
                window.location.href = 'login.html';
                return;
            }
            try {
                const response = await fetch(`${API_URL}/jobs/${jobId}/apply`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                alert(result.message);
            } catch (err) {
                alert('Application failed.');
            }
        }

        document.getElementById('filter-btn').addEventListener('click', fetchJobs);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchJobs();
        });
        document.getElementById('location-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchJobs();
        });

        fetchJobs();
    </script>
</body>
</html>
