<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PHP Talent Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl shadow-gray-200">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">PHP Talent Hub</a>
            <h2 class="text-2xl font-bold text-gray-900 mt-6">Welcome Back</h2>
            <p class="text-gray-500 mt-2">Login to access your dashboard.</p>
        </div>
        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" placeholder="you@example.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none" placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <label for="remember" class="ml-2 block text-sm text-gray-600">Remember me</label>
                </div>
                <a href="#" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500">Forgot Password?</a>
            </div>
            <button type="submit" id="login-btn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-lg shadow-indigo-100 flex items-center justify-center">
                <span>Login</span>
                <i class="fas fa-arrow-right ml-2 text-sm"></i>
            </button>
        </form>
        <div class="mt-8 text-center">
            <p class="text-gray-600">Don't have an account? <a href="register.html" class="text-indigo-600 font-bold hover:underline">Register now</a></p>
        </div>
    </div>l
    <script src="js/auth.js"></script>
</body>
</html>
